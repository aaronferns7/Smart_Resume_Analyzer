<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candidate Analysis | TalentCortex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../../css/common.css">
  <link rel="stylesheet" href="../../css/hr.css">
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="hr-navbar">
  <div class="nav-left">
    <h2>TalentCortex</h2>
    <span>HR Portal</span>
  </div>

  <div class="nav-right">
    <span class="user-name">HR Manager</span>
    <div class="avatar">HR</div>
    <a href="../auth/login.html" class="logout">Logout</a>
  </div>
</nav>

<main class="container">

  <header class="page-header">
    <h1>Candidate Analysis</h1>
    <p>Skill match percentage and missing skills for each candidate</p>
  </header>

  <!-- FILTER BAR -->
  <section class="filter-bar">
    <div class="filter-group">
      <label>Show</label>
      <select id="filterType">
        <option value="top">Top Candidates</option>
        <option value="bottom">Bottom Candidates</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Number</label>
      <input type="number" id="candidateCount" value="5" min="1">
    </div>

    <button id="applyFilterBtn">Apply</button>
  </section>

  <!-- RESULTS TABLE -->
  <section class="table-section">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Match %</th>
            <th>Matched Skills</th>
            <th>Missing Skills</th>
          </tr>
        </thead>

        <tbody id="analysisTable">
          <tr>
            <td>Keith Dias</td>
            <td class="good">88%</td>
            <td>Python, ML, NLP</td>
            <td>AWS, Docker</td>
          </tr>
          <tr>
            <td>Dylan Braganza</td>
            <td class="good">82%</td>
            <td>Java, SQL</td>
            <td>Spring Boot</td>
          </tr>
          <tr>
            <td>Arnav Kumar</td>
            <td class="average">65%</td>
            <td>HTML, CSS</td>
            <td>JavaScript, React</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script src="../../js/hr.js"></script>
</body>
</html>

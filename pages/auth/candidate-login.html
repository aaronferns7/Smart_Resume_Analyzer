<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candidate Login | TalentCortex</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

<div class="auth-container">

  <div class="auth-card">
    <h2>TalentCortex</h2>
    <h3>Candidate Login</h3>
    <p class="subtitle">Access your dashboard and resume analysis</p>

    <form id="candidateLoginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" required>
      </div>

      <button type="submit" class="auth-btn">
        Login
      </button>
    </form>

    <p class="switch-link">
      HR? <a href="hr-login.html">Login here</a>
    </p>
  </div>

</div>

</body>
</html>
<!-- Redirect to candidate dashboard on login (demo) -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('candidateLoginForm');
  if (!form) return;
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    // In a real app authenticate with backend here.
    window.location.href = '../Candidate/dashboard.html';
  });
});
</script>
